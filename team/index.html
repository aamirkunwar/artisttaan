  <style>
    .team-photo-wrap { position: relative; overflow: hidden; border-radius: 4px; background: #111; }
    .team-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; filter: grayscale(1) contrast(1.05); transition: filter 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .team-card { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease; opacity: 0; transform: translateY(28px); }
    .team-card.in-view { opacity: 1; transform: translateY(0); transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
    .team-card:hover { transform: translateY(-6px); }
    .team-card.in-view:hover { transform: translateY(-6px); }
    .team-card:hover .team-photo { filter: grayscale(0) contrast(1); transform: scale(1.05); }
    .team-card:hover .team-photo-wrap { box-shadow: 0 24px 48px -12px rgba(0,0,0,0.35); }
    .team-index { position: absolute; top: 16px; left: 16px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: #fff; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); padding: 4px 10px; border-radius: 999px; }
    .team-role-badge { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 16px; background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0)); display: flex; align-items: center; gap: 8px; }
    .team-role-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; flex-shrink: 0; }
    .insta-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: 9999px; font-size: 0.8125rem; font-weight: 600; text-decoration: none; color: #fff; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); transition: transform 0.3s ease; }
    .insta-btn:hover { transform: translateY(-2px); }
    .back-link { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; font-weight: 500; color: #666; transition: color 0.3s; text-decoration: none; }
    .back-link:hover { color: #000; }
  </style>
</head>

  <!-- HEADER -->
  <section class="section-pad pt-32 md:pt-40 pb-8">

  <!-- TEAM GRID -->
  <section class="px-6 pb-24">

        <div class="skeleton rounded-none aspect-[3/4]"></div>

      </div>
      <p class="text-xs text-gray-600 mt-8">&copy; 2026 ARTISTTAAN. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const instaIcon = '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>';

    async function loadTeam() {
      const container = document.getElementById('team-container');
      try {
        const res = await fetch('../assets/data/artists.json');
        const data = await res.json();
        const team = data.team || [];
        if (!team.length) {
          container.innerHTML = '<p class="text-muted col-span-2 text-center py-8">No team members yet.</p>';
          return;
        }

        container.innerHTML = team.map((member, i) => `
          <article class="team-card">
            <div class="team-photo-wrap mb-6">
              <span class="team-index">0${i + 1}</span>
              <img src="../${member.photo}" alt="${member.name}" class="team-photo" loading="lazy" />
              <div class="team-role-badge">
                <span class="team-role-dot"></span>
                <p class="text-white text-xs font-bold uppercase tracking-wider">${member.role}</p>
              </div>
            </div>
            <h2 class="text-2xl font-black tracking-tight">${member.name}</h2>
            <p class="text-body mt-4">${member.bio}</p>
            <a href="${member.instagram}" target="_blank" rel="noopener noreferrer" class="insta-btn mt-6">
              ${instaIcon} ${member.instagram_handle}
            </a>
          </article>
        `).join('');

        // Staggered scroll-reveal
        const cards = container.querySelectorAll('.team-card');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry, i) => {
            if (entry.isIntersecting) {
              setTimeout(() => entry.target.classList.add('in-view'), i * 90);
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.15 });
        cards.forEach(c => observer.observe(c));
      } catch (err) {
        console.error('Failed to load team data:', err);
        container.innerHTML = '<p class="text-red-500 col-span-2 text-center py-8">Error loading team.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadTeam);
  </script>
</body>
