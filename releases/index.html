<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Releases — ARTISTTAAN</title>
  <meta name="description" content="Full discography of ARTISTTAAN. 89 releases from 2016 to today."/>
  <link rel="canonical" href="https://artisttaanmusic.com/releases/" />
  <meta property="og:url" content="https://artisttaanmusic.com/releases/" />
  <meta property="og:title" content="Releases | ARTISTTAAN" />
  <meta property="og:description" content="Full discography of ARTISTTAAN. 89 releases from 2016 to today." />
  <meta property="og:image" content="https://artisttaanmusic.com/assets/images/logo/og-image.jpg" />
  <link rel="icon" type="image/png" href="../assets/images/logo/logo-icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#fafaf8;color:#0a0a0a;font-family:'Inter',sans-serif;overflow-x:hidden}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,250,248,0.95);backdrop-filter:blur(12px);border-bottom:1px solid #e5e5e5;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo img{height:32px;width:auto}
    .nav-links{display:flex;gap:28px}
    .nav-links a{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;text-decoration:none;color:#888;transition:color 0.2s}
    .nav-links a:hover,.nav-links a.active{color:#0a0a0a}
    .header{margin-top:60px;padding:40px 32px 24px;border-bottom:1px solid #e5e5e5}
    .header-top{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .header-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.15em;color:#888;margin-bottom:8px}
    .header-title{font-size:clamp(32px,5vw,64px);font-weight:900;letter-spacing:-0.03em;line-height:1}
    .header-count{font-size:13px;color:#888;align-self:flex-end}
    .filters{padding:16px 32px;border-bottom:1px solid #e5e5e5;background:#fafaf8;position:sticky;top:60px;z-index:90;display:flex;flex-direction:column;gap:10px}
    .filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#aaa;min-width:48px}
    .filter-btn{padding:5px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;border:1px solid #e0e0e0;background:transparent;cursor:pointer;transition:all 0.2s;color:#888;border-radius:2px}
    .filter-btn:hover{border-color:#000;color:#000}
    .filter-btn.active{background:#000;color:#fff;border-color:#000}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px;padding:28px 32px;max-width:1600px;margin:0 auto}
    .release-card{cursor:pointer;text-decoration:none;display:block}
    .poster{aspect-ratio:1;overflow:hidden;background:#1a1a1a;position:relative;margin-bottom:8px}
    .poster img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
    .release-card:hover .poster img{transform:scale(1.06)}
    .poster-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background 0.3s}
    .release-card:hover .poster-overlay{background:rgba(0,0,0,0.55)}
    .play-icon{opacity:0;transition:opacity 0.3s;color:#fff}
    .release-card:hover .play-icon{opacity:1}
    .release-title{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .release-artist{font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
    .release-year{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.06em}
    .no-results{grid-column:1/-1;text-align:center;padding:80px 0;color:#888;font-size:14px}
    .latest{padding:28px 32px 4px;max-width:1600px;margin:0 auto}
    .latest-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#aaa;margin-bottom:14px}
    .ls{position:relative;overflow:hidden;border-radius:4px}
    .ls-track{display:flex;transition:transform 0.5s cubic-bezier(.22,1,.36,1)}
    .ls-slide{flex:0 0 100%;display:grid;grid-template-columns:200px 1fr;gap:28px;background:#0a0a0a;color:#fff;padding:28px}
    .ls-poster{width:200px;height:200px;overflow:hidden;background:#1a1a1a;flex-shrink:0}
    .ls-poster img{width:100%;height:100%;object-fit:cover}
    .ls-info{display:flex;flex-direction:column;justify-content:center;gap:6px;min-width:0}
    .ls-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:#fff;background:rgba(255,255,255,0.12);padding:4px 10px;border-radius:2px;width:fit-content;margin-bottom:8px}
    .ls-title{font-size:clamp(20px,3vw,32px);font-weight:900;letter-spacing:-0.02em;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ls-artist{font-size:14px;color:rgba(255,255,255,0.7);margin-top:4px}
    .ls-year{font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
    .ls-actions{margin-top:16px}
    .ls-actions a{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#fff;color:#0a0a0a;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;text-decoration:none;border-radius:2px;transition:opacity 0.2s}
    .ls-actions a:hover{opacity:0.85}
    .ls-arrow{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.14);color:#fff;border:none;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;transition:background 0.2s;z-index:2}
    .ls-arrow:hover{background:rgba(255,255,255,0.28)}
    .ls-prev{left:10px}
    .ls-next{right:10px}
    .ls-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
    .ls-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;transition:background 0.2s,width 0.2s}
    .ls-dot.active{background:#fff;width:18px;border-radius:3px}
    @media(max-width:640px){.ls-slide{grid-template-columns:1fr;padding:20px}.ls-poster{width:100%;height:auto;aspect-ratio:1}}
    footer{background:#0a0a0a;color:#fff;padding:40px 32px;display:flex;align-items:center;justify-content:space-between;margin-top:40px}
    footer p{font-size:12px;color:#555}
    footer a{font-size:12px;color:#555;text-decoration:none;transition:color 0.2s}
    footer a:hover{color:#fff}
    @media(max-width:768px){nav{padding:0 16px}.header,.filters{padding-left:16px;padding-right:16px}.grid{padding:16px;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px}footer{flex-direction:column;gap:12px;text-align:center}.latest{padding:20px 16px 4px}}
  </style>
</head>
<body>
<nav>
  <a href="../" class="nav-logo"><img src="../assets/images/logo/logo-nav.png" alt="ARTISTTAAN"/></a>
  <div class="nav-links">
    <a href="../#roster">Roster</a>
    <a href="./" class="active">Releases</a>
    <a href="../culture/">Culture</a>
    <a href="../#demo">Submit Demo</a>
  </div>
</nav>
<div class="header">
  <div class="header-top">
    <div>
      <p class="header-label">Discography</p>
      <h1 class="header-title">All Releases</h1>
    </div>
    <p class="header-count" id="release-count">89 releases</p>
  </div>
</div>
<div class="latest" id="latest-release">
  <p class="latest-label">Latest Releases</p>
  <div class="ls" id="ls">
    <div class="ls-track" id="ls-track"></div>
    <button class="ls-arrow ls-prev" id="ls-prev" aria-label="Previous">&#8249;</button>
    <button class="ls-arrow ls-next" id="ls-next" aria-label="Next">&#8250;</button>
    <div class="ls-dots" id="ls-dots"></div>
  </div>
</div>
<div class="filters">
  <div class="filter-row">
    <span class="filter-label">Year</span>
    <button class="filter-btn active" data-type="year" data-value="all">All</button>
    <button class="filter-btn" data-type="year" data-value="2026">2026</button><button class="filter-btn" data-type="year" data-value="2025">2025</button><button class="filter-btn" data-type="year" data-value="2024">2024</button><button class="filter-btn" data-type="year" data-value="2023">2023</button><button class="filter-btn" data-type="year" data-value="2021">2021</button><button class="filter-btn" data-type="year" data-value="2020">2020</button><button class="filter-btn" data-type="year" data-value="2019">2019</button><button class="filter-btn" data-type="year" data-value="2018">2018</button><button class="filter-btn" data-type="year" data-value="2017">2017</button><button class="filter-btn" data-type="year" data-value="2016">2016</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Artist</span>
    <button class="filter-btn active" data-type="artist" data-value="all">All</button>
    <button class="filter-btn" data-type="artist" data-value="Abir">Abir</button><button class="filter-btn" data-type="artist" data-value="Amie">Amie</button><button class="filter-btn" data-type="artist" data-value="Apoorvv">Apoorvv</button><button class="filter-btn" data-type="artist" data-value="Faraz">Faraz</button><button class="filter-btn" data-type="artist" data-value="Harjas">Harjas</button><button class="filter-btn" data-type="artist" data-value="Kay J">Kay J</button><button class="filter-btn" data-type="artist" data-value="Luck">Luck</button><button class="filter-btn" data-type="artist" data-value="Lukka">Lukka</button><button class="filter-btn" data-type="artist" data-value="Manisten">Manisten</button><button class="filter-btn" data-type="artist" data-value="Mr A">Mr A</button><button class="filter-btn" data-type="artist" data-value="Muhfaad">Muhfaad</button><button class="filter-btn" data-type="artist" data-value="Newtone">Newtone</button><button class="filter-btn" data-type="artist" data-value="Raga">Raga</button><button class="filter-btn" data-type="artist" data-value="Rigul">Rigul</button><button class="filter-btn" data-type="artist" data-value="Rish">Rish</button><button class="filter-btn" data-type="artist" data-value="Sam Rajput">Sam Rajput</button><button class="filter-btn" data-type="artist" data-value="Shrey">Shrey</button><button class="filter-btn" data-type="artist" data-value="Slay">Slay</button><button class="filter-btn" data-type="artist" data-value="Talwar">Talwar</button><button class="filter-btn" data-type="artist" data-value="Talwiinder">Talwiinder</button><button class="filter-btn" data-type="artist" data-value="Yawar">Yawar</button>
  </div>
</div>
<div class="grid" id="releases-grid"></div>
<footer>
  <p>© 2026 ARTISTTAAN · All Rights Reserved</p>
  <a href="../">← Back to ARTISTTAAN</a>
</footer>
<script>
let releases = [];

function initLatestSlideshow(){
  const slides=releases.slice(0,6);
  const track=document.getElementById('ls-track');
  const dotsEl=document.getElementById('ls-dots');
  const prevBtn=document.getElementById('ls-prev');
  const nextBtn=document.getElementById('ls-next');
  if(!slides.length){document.getElementById('latest-release').style.display='none';return;}
  track.innerHTML=slides.map(r=>`
    <div class="ls-slide">
      <div class="ls-poster"><img src="../${r.cover}" alt="${r.title}" loading="lazy"/></div>
      <div class="ls-info">
        <span class="ls-tag">New</span>
        <p class="ls-title">${r.title}</p>
        <p class="ls-artist">${r.artist}</p>
        <p class="ls-year">${r.year}</p>
        <div class="ls-actions"><a href="${r.spotify_url}" target="_blank" rel="noopener noreferrer">Listen on Spotify</a></div>
      </div>
    </div>`).join('');
  dotsEl.innerHTML=slides.map((_,i)=>`<span class="ls-dot${i===0?' active':''}" data-i="${i}"></span>`).join('');
  const dots=[...dotsEl.children];
  let idx=0,timer;
  function go(i){
    idx=(i+slides.length)%slides.length;
    track.style.transform=`translateX(-${idx*100}%)`;
    dots.forEach((d,j)=>d.classList.toggle('active',j===idx));
  }
  function startTimer(){timer=setInterval(()=>go(idx+1),5000);}
  function stopTimer(){clearInterval(timer);}
  prevBtn.addEventListener('click',()=>{go(idx-1);stopTimer();startTimer();});
  nextBtn.addEventListener('click',()=>{go(idx+1);stopTimer();startTimer();});
  dots.forEach(d=>d.addEventListener('click',()=>{go(+d.dataset.i);stopTimer();startTimer();}));
  const box=document.getElementById('ls');
  box.addEventListener('mouseenter',stopTimer);
  box.addEventListener('mouseleave',startTimer);
  if(slides.length<2){prevBtn.style.display='none';nextBtn.style.display='none';dotsEl.style.display='none';}
  else{startTimer();}
}

let activeYear='all', activeArtist='all';
function filterReleases(){
  return releases.filter(r=>{
    const y=activeYear==='all'||r.year===activeYear;
    const a=activeArtist==='all'||r.artist.includes(activeArtist);
    return y&&a;
  });
}
function render(){
  const grid=document.getElementById('releases-grid');
  const filtered=filterReleases();
  document.getElementById('release-count').textContent=filtered.length+' releases';
  if(!filtered.length){grid.innerHTML='<div class="no-results">No releases found.</div>';return;}
  grid.innerHTML=filtered.map(r=>`
    <a class="release-card" href="${r.spotify_url==='#'?'javascript:void(0)':r.spotify_url}" ${r.spotify_url!=='#'?'target="_blank" rel="noopener noreferrer"':''}>
      <div class="poster">
        <img src="../${r.cover}" alt="${r.title}" loading="lazy"/>
        <div class="poster-overlay">
          <svg class="play-icon" width="44" height="44" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm4.5 12.3l-6 4.5c-.3.2-.5.1-.5-.3V7.5c0-.4.2-.5.5-.3l6 4.5c.3.2.3.6 0 .6z"/></svg>
        </div>
      </div>
      <p class="release-title">${r.title}</p>
      <p class="release-artist">${r.artist}</p>
      <p class="release-year">${r.year}</p>
    </a>`).join('');
}
document.querySelectorAll('[data-type="year"]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-type="year"]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');activeYear=btn.dataset.value;render();
  });
});
document.querySelectorAll('[data-type="artist"]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-type="artist"]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');activeArtist=btn.dataset.value;render();
  });
});

async function init(){
  try{
    const res=await fetch('../assets/data/artists.json');
    const data=await res.json();
    releases=data.releases||[];
  }catch(e){
    console.error('Failed to load releases data:',e);
    releases=[];
  }
  initLatestSlideshow();
  render();
}
init();
</script>
</body>
</html>
