function toEmbed(url){
  if(!url||url==='#')return null;
  return url.replace('open.spotify.com/','open.spotify.com/embed/');
}
function renderLatest(){
  const box=document.getElementById('latest-release');
  const latest=releases[0];
  if(!latest){box.innerHTML='';return;}
  const embed=toEmbed(latest.spotify);
  box.innerHTML=`
    <p class="latest-label">Latest Release</p>
    <div class="latest-card">
      <div class="latest-poster"><img src="../${latest.cover}" alt="${latest.title}" loading="lazy"/></div>
      <div class="latest-info">
        <span class="latest-tag">New</span>
        <p class="latest-title">${latest.title}</p>
        <p class="latest-artist">${latest.artist}</p>
        <p class="latest-year">${latest.year}</p>
        ${embed?`<div class="latest-embed"><iframe src="${embed}" width="100%" height="152" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>`:''}
        <div class="latest-actions">
          <a href="${latest.spotify}" target="_blank" rel="noopener noreferrer">Listen on Spotify</a>
        </div>
      </div>
    </div>`;
}
renderLatest();
let activeYear='all', activeArtist='all';
function filterReleases(){
  return releases.filter(r=>{
    const y=activeYear==='all'||r.year===activeYear;
    const a=activeArtist==='all'||r.artist.includes(activeArtist);
    return y&&a;
  });
}
function render(){
  const grid=document.getElementById('releases-grid');
  const filtered=filterReleases();
  document.getElementById('release-count').textContent=filtered.length+' releases';
  if(!filtered.length){grid.innerHTML='<div class="no-results">No releases found.</div>';return;}
  grid.innerHTML=filtered.map(r=>`
    <a class="release-card" href="${r.spotify==='#'?'javascript:void(0)':r.spotify}" ${r.spotify!=='#'?'target="_blank" rel="noopener noreferrer"':''}>
      <div class="poster">
        <img src="../${r.cover}" alt="${r.title}" loading="lazy"/>
        <div class="poster-overlay">
          <svg class="play-icon" width="44" height="44" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm4.5 12.3l-6 4.5c-.3.2-.5.1-.5-.3V7.5c0-.4.2-.5.5-.3l6 4.5c.3.2.3.6 0 .6z"/></svg>
        </div>
      </div>
      <p class="release-title">${r.title}</p>
      <p class="release-artist">${r.artist}</p>
      <p class="release-year">${r.year}</p>
    </a>`).join('');
}
document.querySelectorAll('[data-type="year"]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-type="year"]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');activeYear=btn.dataset.value;render();
  });
});
document.querySelectorAll('[data-type="artist"]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-type="artist"]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');activeArtist=btn.dataset.value;render();
  });
});
render();
</script>
