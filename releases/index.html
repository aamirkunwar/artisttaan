  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#fafaf8;color:#0a0a0a;font-family:'Inter',sans-serif;overflow-x:hidden}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,250,248,0.95);backdrop-filter:blur(12px);border-bottom:1px solid #e5e5e5;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between}

    .poster{aspect-ratio:1;overflow:hidden;background:#1a1a1a;position:relative;margin-bottom:8px}

    .poster-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background 0.3s}
    .release-card:hover .poster-overlay{background:rgba(0,0,0,0.55)}
    .play-icon{opacity:0;transition:opacity 0.3s;color:#fff}
    .release-card:hover .play-icon{opacity:1}
    .release-title{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .release-year{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.06em}

let activeYear = 'all';
let activeArtist = 'all';

function filterReleases() {
  return releases.filter(r => {
    const yearMatch = activeYear === 'all' || r.year === activeYear;
    const artistMatch = activeArtist === 'all' || r.artist.includes(activeArtist);
    return yearMatch && artistMatch;
  });
}

function render() {
  const grid = document.getElementById('releases-grid');
  const filtered = filterReleases();
  document.getElementById('release-count').textContent = filtered.length + ' releases';
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No releases found for this filter.</div>';
    return;
  }
  grid.innerHTML = filtered.map(r => `
    <a class="release-card" href="${r.spotify}" target="_blank" rel="noopener noreferrer">
      <div class="poster">
        <img src="${r.cover}" alt="${r.title}" loading="lazy" />
        <div class="poster-overlay">
          <svg class="play-icon" width="44" height="44" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm4.5 12.3l-6 4.5c-.3.2-.5.1-.5-.3V7.5c0-.4.2-.5.5-.3l6 4.5c.3.2.3.6 0 .6z"/></svg>
        </div>
      </div>
      <p class="release-title">${r.title}</p>
      <p class="release-artist">${r.artist}</p>
      <p class="release-year">${r.year}</p>
    </a>`).join('');
}

document.querySelectorAll('[data-type="year"]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-type="year"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeYear = btn.dataset.value;
    render();
  });
});

document.querySelectorAll('[data-type="artist"]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-type="artist"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeArtist = btn.dataset.value;
    render();
  });
});

render();
</script>
