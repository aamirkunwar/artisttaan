<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <base href="/artist/" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Artist | ARTISTTAAN</title>
  <meta name="description" id="meta-description" content="" />
  <link rel="icon" type="image/png" href="../assets/images/logo/logo-icon.png" />
  <meta property="og:type" content="profile" />
  <meta property="og:url" id="og-url" content="" />
  <link rel="canonical" id="canonical-url" href="" />
  <meta property="og:image" id="og-image" content="" />
  <meta property="og:title" id="og-title" content="" />
  <meta property="og:description" id="og-description" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f8f7f4;
      --gray: #888;
      --light: #f0ede8;
      --border: #e8e5e0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      background: rgba(248, 247, 244, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { height: 26px; width: auto; }
    .nav-back {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; text-decoration: none; color: var(--gray);
      display: flex; align-items: center; gap: 6px; transition: color 0.2s;
    }
    .nav-back:hover { color: var(--black); }

    /* ── HERO ── */
    .hero {
      margin-top: 56px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 56px);
    }
    .hero-left {
      padding: 80px 60px 80px 40px;
      display: flex; flex-direction: column; justify-content: flex-end;
      border-right: 1px solid var(--border);
    }
    .hero-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gray); margin-bottom: 24px;
    }
    .hero-name {
      font-size: clamp(72px, 10vw, 140px);
      font-weight: 900; letter-spacing: -0.04em; line-height: 0.88;
      margin-bottom: 32px;
    }
    .hero-role {
      font-size: 13px; color: var(--gray); letter-spacing: 0.06em;
      text-transform: uppercase; margin-bottom: 48px;
    }
    .hero-bio {
      font-size: 15px; line-height: 1.75; color: #444;
      max-width: 440px; margin-bottom: 48px;
    }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .btn-solid {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 24px; background: var(--black); color: #fff;
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; text-decoration: none; transition: opacity 0.2s;
    }
    .btn-solid:hover { opacity: 0.8; }
    .btn-ghost {
      display: inline-flex; align-items: center;
      padding: 11px 24px; border: 1px solid var(--border); color: var(--black);
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; text-decoration: none; transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: var(--black); background: var(--black); color: #fff; }

    .hero-right {
      position: relative; overflow: hidden;
      background: #1a1a1a;
    }
    .hero-right img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
    }
    .hero-stats {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      padding: 48px 40px 40px;
      display: flex; gap: 40px;
    }
    .hero-stat p:first-child {
      font-size: 32px; font-weight: 900; color: #fff;
      letter-spacing: -0.02em; line-height: 1;
    }
    .hero-stat p:last-child {
      font-size: 10px; color: rgba(255,255,255,0.45);
      text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px;
    }

    /* ── TABS ── */
    .tabs {
      position: sticky; top: 56px; z-index: 90;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex; padding: 0 40px; overflow-x: auto;
    }
    .tab {
      padding: 16px 20px; font-size: 11px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray);
      border-bottom: 1px solid transparent; margin-bottom: -1px;
      cursor: pointer; white-space: nowrap; background: none;
      border-top: none; border-left: none; border-right: none;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--black); }
    .tab.active { color: var(--black); border-bottom-color: var(--black); }

    /* ── SECTIONS ── */
    .wrap { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
    .section { padding: 80px 0; border-bottom: 1px solid var(--border); }
    .section:last-of-type { border-bottom: none; }
    .sec-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gray); margin-bottom: 8px;
    }
    .sec-title {
      font-size: clamp(28px, 3.5vw, 44px); font-weight: 800;
      letter-spacing: -0.03em; line-height: 1; margin-bottom: 48px;
    }

    /* ── GENRES ── */
    .genre-tag {
      display: inline-block; padding: 5px 14px; border: 1px solid var(--border);
      font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
      color: var(--gray); margin: 4px 4px 4px 0;
    }

    /* ── PLATFORM LINKS ── */
    .platform-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 40px; }
    .platform-link {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border: 1px solid var(--border);
      font-size: 11px; font-weight: 500; letter-spacing: 0.05em;
      text-decoration: none; color: var(--black); transition: all 0.2s;
    }
    .platform-link:hover { background: var(--black); color: #fff; border-color: var(--black); }

    /* ── LATEST RELEASES SLIDESHOW ── */
    .ls{position:relative; overflow:hidden; border-radius:4px; margin-bottom:48px;}
    .ls-track{display:flex; transition:transform 0.5s cubic-bezier(.22,1,.36,1);}
    .ls-slide{
      flex:0 0 100%; display:grid; grid-template-columns:200px 1fr; gap:28px;
      background:var(--black); color:#fff; padding:28px;
    }
    .ls-poster{width:200px; height:200px; overflow:hidden; background:#1a1a1a; flex-shrink:0;}
    .ls-poster img{width:100%;height:100%;object-fit:cover;}
    .ls-info{display:flex;flex-direction:column;justify-content:center;gap:6px;min-width:0;}
    .ls-tag{
      font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.14em;
      color:#fff; background:rgba(255,255,255,0.12); padding:4px 10px; border-radius:2px;
      width:fit-content; margin-bottom:8px;
    }
    .ls-title{font-size:clamp(20px,3vw,32px); font-weight:900; letter-spacing:-0.02em; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .ls-year{font-size:11px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.08em; margin-top:2px;}
    .ls-actions{margin-top:16px;}
    .ls-actions a{
      display:inline-flex; align-items:center; gap:8px; padding:10px 20px;
      background:#fff; color:var(--black); font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.08em; text-decoration:none;
      border-radius:2px; transition:opacity 0.2s;
    }
    .ls-actions a:hover{opacity:0.85;}
    .ls-arrow{
      position:absolute; top:50%; transform:translateY(-50%); width:34px; height:34px;
      border-radius:50%; background:rgba(255,255,255,0.14); color:#fff; border:none;
      cursor:pointer; font-size:18px; line-height:1; display:flex; align-items:center;
      justify-content:center; transition:background 0.2s; z-index:2;
    }
    .ls-arrow:hover{background:rgba(255,255,255,0.28);}
    .ls-prev{left:10px;}
    .ls-next{right:10px;}
    .ls-dots{position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:6px; z-index:2;}
    .ls-dot{width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.3); cursor:pointer; transition:background 0.2s,width 0.2s;}
    .ls-dot.active{background:#fff; width:18px; border-radius:3px;}
    @media (max-width:600px){.ls-slide{grid-template-columns:1fr; padding:20px;}.ls-poster{width:100%;height:auto;aspect-ratio:1;}}

    /* ── RELEASES ── */
    .releases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }
    .rel-card { text-decoration: none; color: inherit; display: block; }
    .rel-poster {
      aspect-ratio: 1; overflow: hidden; background: #1a1a1a;
      position: relative; margin-bottom: 10px;
    }
    .rel-poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
    .rel-card:hover .rel-poster img { transform: scale(1.05); }
    .rel-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0); display: flex;
      align-items: center; justify-content: center; transition: background 0.3s;
    }
    .rel-card:hover .rel-overlay { background: rgba(0,0,0,0.45); }
    .rel-play { opacity: 0; transition: opacity 0.3s; color: #fff; }
    .rel-card:hover .rel-play { opacity: 1; }
    .rel-title { font-size: 12px; font-weight: 500; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rel-year { font-size: 11px; color: var(--gray); margin-top: 2px; }

    /* ── VIDEOS ── */
    .videos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .vid-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; font-weight: 500; }
    .vid-frame { aspect-ratio: 16/9; overflow: hidden; background: #1a1a1a; }
    .vid-frame iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── FOOTER ── */
    footer {
      background: var(--black); color: #fff;
      padding: 40px; display: flex; align-items: center; justify-content: space-between;
    }
    footer p { font-size: 11px; color: #555; }
    footer a { font-size: 11px; color: #555; text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: #fff; }

    /* ── REVEAL ON SCROLL ── */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1); }
    .reveal.in-view { opacity: 1; transform: translateY(0); }

    /* ── VIDEO CARDS (facade) ── */
    .vid-card { position: relative; cursor: pointer; overflow: hidden; border-radius: 2px; background: #1a1a1a; transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); }
    .vid-card:hover { transform: translateY(-4px); }
    .vid-thumb { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.6s cubic-bezier(0.16,1,0.3,1), filter 0.4s ease; }
    .vid-card:hover .vid-thumb { transform: scale(1.05); filter: brightness(0.6); }
    .vid-play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.85); width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; opacity: 0.9; transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s ease; }
    .vid-card:hover .vid-play-btn { transform: translate(-50%,-50%) scale(1); opacity: 1; }

    @media (max-width: 900px) {
      nav { padding: 0 20px; }
      .hero { grid-template-columns: 1fr; min-height: auto; }
      .hero-left { padding: 48px 24px; border-right: none; border-bottom: 1px solid var(--border); justify-content: flex-start; }
      .hero-right { height: 60vw; }
      .tabs { padding: 0 20px; }
      .wrap { padding: 0 24px; }
      .section { padding: 56px 0; }
      .releases-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
      .videos-grid { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 12px; text-align: center; padding: 32px 24px; }
    }
    @media (max-width: 600px) {
      .hero-name { font-size: clamp(56px, 16vw, 80px); }
      .hero-stats { gap: 24px; padding: 32px 20px; }
      .hero-stat p:first-child { font-size: 24px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="../"><img class="nav-logo" src="../assets/images/logo/logo-nav.png" alt="ARTISTTAAN" /></a>
  <a href="../#roster" class="nav-back">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Roster
  </a>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-left">
    <p class="hero-label">ARTISTTAAN &nbsp;/&nbsp; <span id="hero-role"></span></p>
    <h1 class="hero-name" id="hero-name"></h1>
    <p class="hero-role" id="hero-role2"></p>
    <p class="hero-bio" id="hero-bio"></p>
    <div class="hero-actions" id="hero-actions"></div>
  </div>
  <div class="hero-right">
    <img id="hero-img" src="" alt="" />
    <div class="hero-stats" id="hero-stats"></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" data-target="music">Music</button>
  <button class="tab" data-target="about">About</button>
  <button class="tab" data-target="videos">Videos</button>
</div>

<!-- MUSIC -->
<div id="music">
  <div class="wrap">
    <div class="section reveal">
      <p class="sec-label">Discography</p>
      <h2 class="sec-title" id="music-title">Music</h2>
      <div id="latest-release-panel"></div>
      <div class="releases-grid" id="releases-grid"></div>
    </div>
  </div>
</div>

<!-- ABOUT -->
<div id="about" style="background: var(--light);">
  <div class="wrap">
    <div class="section reveal">
      <p class="sec-label">About</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;" id="about-grid">
        <div>
          <h2 class="sec-title" id="about-title"></h2>
          <p style="font-size:15px;line-height:1.85;color:#444;margin-bottom:32px;" id="about-bio"></p>
          <div id="genres" style="margin-bottom:0;"></div>
          <div class="platform-links" id="platform-links"></div>
        </div>
        <div style="aspect-ratio:3/4;overflow:hidden;background:#e5e5e5;">
          <img id="about-photo" src="" alt="" style="width:100%;height:100%;object-fit:cover;" />
        </div>
      </div>
    </div>
  </div>
</div>

<!-- VIDEOS -->
<div id="videos" style="background: var(--light);">
  <div class="wrap">
    <div class="section reveal">
      <p class="sec-label">Visuals</p>
      <h2 class="sec-title">Videos</h2>
      <div class="videos-grid" id="videos-grid"></div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 ARTISTTAAN</p>
  <a href="../">← Back to ARTISTTAAN</a>
</footer>

<script>
  function getArtistIdFromUrl() {
    // Clean path form: /artist/slug/  (or /artist/slug)
    const pathMatch = window.location.pathname.match(/\/artist\/([^\/?#]+)\/?$/);
    if (pathMatch && pathMatch[1]) return decodeURIComponent(pathMatch[1]);
    // Legacy form: /artist/?artist=slug — kept working for old shared links
    return new URLSearchParams(window.location.search).get('artist');
  }
  const artistId = getArtistIdFromUrl();

  const artistVideos = {
    shrey: [{t:'Kaagaz Aur Daag',e:'https://www.youtube.com/embed/ZYln3iWRxDk'},{t:'Sifarishein',e:'https://www.youtube.com/embed/rcKlMq2uDlk'},{t:'Thoughts Are Poison',e:'https://www.youtube.com/embed/afRnyWvO6PU'},{t:'Thoda Aur',e:'https://www.youtube.com/embed/Q5E5t5VbVeo'}],
    abir: [{t:'Marz',e:'https://www.youtube.com/embed/U7AdDdqJWUg'},{t:'Kaho Na',e:'https://www.youtube.com/embed/lC9X-FtN7AI'}],
    slay: [{t:'Namaskar',e:'https://www.youtube.com/embed/bLTVqTJ1hUQ'}],
    apoorvv: [], faraz: []
  };

  async function init() {
    try {
      const res = await fetch('../assets/data/artists.json');
      const data = await res.json();
      const artist = data.artists.find(a => a.id === artistId);
      if (!artist) { document.body.innerHTML = '<p style="text-align:center;padding:120px 20px;font-size:14px;color:#888;">Artist not found.</p>'; return; }
      render(artist, data.releases || []);
    } catch(e) { console.error(e); }
  }

  function render(a, allReleases) {
    document.getElementById('page-title').textContent = `${a.name} — ARTISTTAAN`;
    document.getElementById('meta-description').content = a.full_bio || a.bio;
    document.getElementById('og-title').content = `${a.name} | ARTISTTAAN`;
    document.getElementById('og-description').content = a.bio;
    document.getElementById('og-url').content = `https://artisttaanmusic.com/artist/${a.id}/`;
    document.getElementById('canonical-url').href = `https://artisttaanmusic.com/artist/${a.id}/`;
    if (a.square_photo) document.getElementById('og-image').content = `https://artisttaanmusic.com/${a.square_photo}`;

    // Hero
    document.getElementById('hero-role').textContent = a.role;
    document.getElementById('hero-role2').textContent = a.role;
    document.getElementById('hero-name').textContent = a.name;
    document.getElementById('hero-bio').textContent = a.bio;
    document.getElementById('hero-img').src = `../${a.banner || a.photo}`;
    document.getElementById('hero-img').alt = a.name;

    // Hero actions
    const acts = [];
    if (a.spotify_url) acts.push(`<a href="${a.spotify_url}" target="_blank" class="btn-solid">Listen on Spotify</a>`);
    if (a.instagram) acts.push(`<a href="${a.instagram}" target="_blank" class="btn-ghost">Instagram</a>`);
    document.getElementById('hero-actions').innerHTML = acts.join('');

    // Hero stats
    const releases = allReleases.filter(r => r.artist_id === a.id);
    const stats = [];
    if (a.total_streams && a.total_streams !== '—') stats.push(`<div class="hero-stat"><p>${a.total_streams}</p><p>Total Streams</p></div>`);
    stats.push(`<div class="hero-stat"><p>${releases.length}</p><p>Releases</p></div>`);
    document.getElementById('hero-stats').innerHTML = stats.join('');

    // Latest releases slideshow
    const latestPanel = document.getElementById('latest-release-panel');
    const slides = releases.slice(0, 5);
    if (slides.length) {
      latestPanel.innerHTML = `
        <div class="ls" id="ls">
          <div class="ls-track" id="ls-track"></div>
          <button class="ls-arrow ls-prev" id="ls-prev" aria-label="Previous">&#8249;</button>
          <button class="ls-arrow ls-next" id="ls-next" aria-label="Next">&#8250;</button>
          <div class="ls-dots" id="ls-dots"></div>
        </div>`;
      const track = document.getElementById('ls-track');
      const dotsEl = document.getElementById('ls-dots');
      const prevBtn = document.getElementById('ls-prev');
      const nextBtn = document.getElementById('ls-next');
      track.innerHTML = slides.map((r, i) => `
        <div class="ls-slide">
          <div class="ls-poster"><img src="../${r.cover}" alt="${r.title}" loading="lazy" /></div>
          <div class="ls-info">
            <span class="ls-tag">${i === 0 ? 'Latest Release' : 'Recent Release'}</span>
            <p class="ls-title">${r.title}</p>
            <p class="ls-year">${r.year}</p>
            <div class="ls-actions"><a href="${r.spotify_url}" target="_blank" rel="noopener noreferrer">Listen on Spotify</a></div>
          </div>
        </div>`).join('');
      dotsEl.innerHTML = slides.map((_, i) => `<span class="ls-dot${i === 0 ? ' active' : ''}" data-i="${i}"></span>`).join('');
      const dots = [...dotsEl.children];
      let idx = 0, timer;
      function go(i) {
        idx = (i + slides.length) % slides.length;
        track.style.transform = `translateX(-${idx * 100}%)`;
        dots.forEach((d, j) => d.classList.toggle('active', j === idx));
      }
      function startTimer() { timer = setInterval(() => go(idx + 1), 5000); }
      function stopTimer() { clearInterval(timer); }
      prevBtn.addEventListener('click', () => { go(idx - 1); stopTimer(); startTimer(); });
      nextBtn.addEventListener('click', () => { go(idx + 1); stopTimer(); startTimer(); });
      dots.forEach(d => d.addEventListener('click', () => { go(+d.dataset.i); stopTimer(); startTimer(); }));
      const box = document.getElementById('ls');
      box.addEventListener('mouseenter', stopTimer);
      box.addEventListener('mouseleave', startTimer);
      if (slides.length < 2) { prevBtn.style.display = 'none'; nextBtn.style.display = 'none'; dotsEl.style.display = 'none'; }
      else { startTimer(); }
    } else {
      latestPanel.innerHTML = '';
    }

    // Music
    document.getElementById('music-title').textContent = `${a.name}'s Music`;
    document.getElementById('releases-grid').innerHTML = releases.length
      ? releases.map(r => `
        <a class="rel-card" href="${r.spotify_url}" target="_blank" rel="noopener noreferrer">
          <div class="rel-poster">
            <img src="../${r.cover}" alt="${r.title}" loading="lazy" />
            <div class="rel-overlay">
              <svg class="rel-play" width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm4.5 12.3l-6 4.5c-.3.2-.5.1-.5-.3V7.5c0-.4.2-.5.5-.3l6 4.5c.3.2.3.6 0 .6z"/></svg>
            </div>
          </div>
          <p class="rel-title">${r.title}</p>
          <p class="rel-year">${r.year}</p>
        </a>`).join('')
      : '<p style="font-size:13px;color:#888;">Releases coming soon.</p>';

    // About
    document.getElementById('about-title').textContent = a.name;
    document.getElementById('about-bio').textContent = a.full_bio || a.bio;
    document.getElementById('about-photo').src = `../${a.photo}`;
    document.getElementById('about-photo').alt = a.name;
    if (a.genres) document.getElementById('genres').innerHTML = a.genres.map(g => `<span class="genre-tag">${g}</span>`).join('');

    const plats = [];
    if (a.spotify_url) plats.push(`<a href="${a.spotify_url}" target="_blank" class="platform-link">Spotify</a>`);
    if (a.apple_music_url) plats.push(`<a href="${a.apple_music_url}" target="_blank" class="platform-link">Apple Music</a>`);
    if (a.youtube_url) plats.push(`<a href="${a.youtube_url}" target="_blank" class="platform-link">YouTube</a>`);
    if (a.instagram) plats.push(`<a href="${a.instagram}" target="_blank" class="platform-link">Instagram</a>`);
    document.getElementById('platform-links').innerHTML = plats.join('');

    // Videos
    const vids = artistVideos[a.id] || [];
    const playIconSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg>`;
    document.getElementById('videos-grid').innerHTML = vids.length
      ? vids.map(v => {
          const id = v.e.split('/embed/')[1];
          const thumb = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
          return `
        <div>
          <p class="vid-label">${v.t}</p>
          <div class="vid-frame">
            <div class="vid-card" style="width:100%;height:100%;" data-embed="${v.e}">
              <img class="vid-thumb" src="${thumb}" alt="${v.t}" loading="lazy" />
              <div class="vid-play-btn">${playIconSvg}</div>
            </div>
          </div>
        </div>`;
        }).join('')
      : '<p style="font-size:13px;color:#888;">Videos coming soon.</p>';
    document.querySelectorAll('.vid-card').forEach(el => {
      el.addEventListener('click', () => {
        const embed = el.getAttribute('data-embed');
        el.innerHTML = `<iframe src="${embed}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%;height:100%;border:none;display:block;"></iframe>`;
        el.style.cursor = 'default';
      }, { once: true });
    });
  }

  // Tab scroll
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const el = document.getElementById(tab.dataset.target);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    });
  });
  const tabSections = ['music', 'about', 'videos'];
  window.addEventListener('scroll', () => {
    let cur = 'music';
    tabSections.forEach(id => {
      const el = document.getElementById(id);
      if (el && window.scrollY >= el.offsetTop - 120) cur = id;
    });
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.target === cur));
  });

  // Reveal sections on scroll
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
